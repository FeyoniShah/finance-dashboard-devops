<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edit Expense — FinTrack</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<!-- ── Navbar ─────────────────────────────────────────────── -->
<nav class="navbar">
  <a class="navbar-brand" href="/">
    <div class="navbar-icon">💰</div>
    <span class="navbar-title">Fin<span>Track</span></span>
  </a>
  <div class="navbar-date" id="currentDate"></div>
</nav>

<!-- ── Edit Card ──────────────────────────────────────────── -->
<div class="edit-wrapper" style="position:relative;z-index:1;">

  <a href="/" class="btn-back">← Back to Dashboard</a>

  <div class="edit-card">
    <h2>✏️ Edit Expense</h2>

    <form action="/update/{{ expense[0] }}" method="POST">

      <div class="form-group">
        <label for="category">Category</label>
        <select id="category" name="category" class="form-control" required>
          {% set cats = ['🍔 Food','🚗 Transport','🛍️ Shopping','💊 Health','📚 Education','🎬 Entertainment','🏠 Rent','💡 Utilities','✈️ Travel','📦 Other'] %}
          {% for c in cats %}
            <option {% if expense[1] == c %}selected{% endif %}>{{ c }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group">
        <label for="amount">Amount (₹)</label>
        <input id="amount" class="form-control" type="number"
               name="amount" value="{{ expense[2] }}" min="1" required>
      </div>

      <button class="btn-primary" type="submit">Save Changes →</button>
    </form>
  </div>

</div>

<script>
  document.getElementById('currentDate').textContent =
    new Date().toLocaleDateString('en-IN', { weekday:'short', year:'numeric', month:'long', day:'numeric' });
</script>

</body>
</html>
